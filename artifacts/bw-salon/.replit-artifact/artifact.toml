kind = "web"
previewPath = "/"
title = "Black White Güzellik Salonu"
version = "1.0.0"
id = "artifacts/bw-salon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25850

[services.development]
run = "pnpm --filter @workspace/bw-salon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bw-salon", "run", "build" ]
publicDir = "artifacts/bw-salon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25850"
BASE_PATH = "/"
