services:
  - type: web
    name: bw-salon
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run build:production
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: bw-salon-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info

databases:
  - name: bw-salon-db
    plan: free
    region: frankfurt
    databaseName: bwsalon
    user: bwsalon
